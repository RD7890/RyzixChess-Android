name: Build Ryzix Chess APK

on:
  push:
    branches:
      - "main"
      - "dev"
      - "release/**"
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TG_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_release_apk:
    name: Build Ryzix Chess APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Notify: Build started ─────────────────────────────────────────
      - name: Telegram — Build started
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$(printf '🔨 *Ryzix Chess v1.0 — Build Started*\n\n📌 Branch: `%s`\n🔢 Build: #%s\n📝 Commit: `%s`\n\n⚡ Downloading Ryzix Engine + Stockfish 16 + assembling APK...' \
              '${{ github.ref_name }}' '${{ github.run_number }}' "$SHORT_SHA")"

      # ── 2. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 3. Java ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Gradle cache ──────────────────────────────────────────────────
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Download Ryzix Engine (libryzix.so) ───────────────────────────
      - name: Download Ryzix Engine
        run: |
          set -e
          mkdir -p app/src/main/jniLibs/arm64-v8a

          echo "Fetching latest Ryzix engine release..."
          RELEASE_JSON=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/RD7890/Ryzix/releases/latest")

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = [a for a in data.get('assets', []) if a['name'] == 'libryzix.so']
          print(assets[0]['browser_download_url'] if assets else '')
          " 2>/dev/null || echo "")

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "Downloading from release: $DOWNLOAD_URL"
            curl -fsSL "$DOWNLOAD_URL" -o app/src/main/jniLibs/arm64-v8a/libryzix.so
            echo "Downloaded: $(wc -c < app/src/main/jniLibs/arm64-v8a/libryzix.so) bytes"
          else
            echo "No release asset found — building Ryzix from source..."
            sudo apt-get install -y --no-install-recommends build-essential

            NDK_VERSION="r25c"
            curl -fsSL "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
              -o /tmp/ndk.zip
            unzip -q /tmp/ndk.zip -d /tmp/ndk
            NDK_PATH="/tmp/ndk/android-ndk-${NDK_VERSION}"
            CXX="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"

            curl -fsSL https://github.com/RD7890/Ryzix/archive/refs/heads/main.tar.gz \
              | tar -xz -C /tmp
            "$CXX" -O3 -DNDEBUG -std=c++17 -march=armv8-a \
              -fno-exceptions -fno-rtti \
              -static-libstdc++ -lm \
              /tmp/Ryzix-main/src/ryzix.cpp \
              -o app/src/main/jniLibs/arm64-v8a/libryzix.so
            echo "Compiled: $(wc -c < app/src/main/jniLibs/arm64-v8a/libryzix.so) bytes"
          fi

      # ── 6. Download Stockfish 16 ARM64 (libstockfish.so) ─────────────────
      - name: Download Stockfish 16
        run: |
          set -e
          mkdir -p app/src/main/jniLibs/arm64-v8a

          echo "Fetching Stockfish 16 release assets..."
          SF_RELEASE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/official-stockfish/Stockfish/releases/tags/sf_16")

          # Pick the Android ARM64 asset (zip or direct binary)
          ASSET_URL=$(echo "$SF_RELEASE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              name = a['name'].lower()
              if 'android' in name and ('armv8' in name or 'arm64' in name):
                  print(a['browser_download_url'])
                  break
          " 2>/dev/null || echo "")

          if [ -z "$ASSET_URL" ]; then
            echo "No Android asset in sf_16 release — checking latest release..."
            SF_RELEASE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/official-stockfish/Stockfish/releases/latest")
            ASSET_URL=$(echo "$SF_RELEASE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              name = a['name'].lower()
              if 'android' in name and ('armv8' in name or 'arm64' in name):
                  print(a['browser_download_url'])
                  break
          " 2>/dev/null || echo "")
          fi

          if [ -n "$ASSET_URL" ]; then
            echo "Downloading Stockfish from: $ASSET_URL"
            curl -fsSL "$ASSET_URL" -L -o /tmp/sf_download
            echo "Downloaded $(wc -c < /tmp/sf_download) bytes — type: $(file /tmp/sf_download | cut -d: -f2)"

            # Extract based on archive type.
            # SF 16 ships stockfish-android-armv8.TAR (not zip) — must handle tar.
            if file /tmp/sf_download | grep -qi "zip"; then
              echo "Extracting zip..."
              mkdir -p /tmp/sf_extracted
              cd /tmp && unzip -o sf_download -d sf_extracted
            elif file /tmp/sf_download | grep -qiE "tar|POSIX|archive"; then
              echo "Extracting tar..."
              mkdir -p /tmp/sf_extracted
              tar -xf /tmp/sf_download -C /tmp/sf_extracted
            else
              echo "Raw binary (no archive wrapper)"
              mkdir -p /tmp/sf_extracted
              cp /tmp/sf_download /tmp/sf_extracted/stockfish
            fi

            # Find the actual ELF binary inside the extracted folder
            SF_BIN=$(find /tmp/sf_extracted -type f | xargs -I{} sh -c 'file "{}" | grep -qi ELF && echo "{}"' | head -1)
            if [ -z "$SF_BIN" ]; then
              # Fallback: take whatever non-archive file we find
              SF_BIN=$(find /tmp/sf_extracted -type f ! -name "*.tar" ! -name "*.zip" ! -name "*.gz" | head -1)
            fi
            echo "Using binary: $SF_BIN"

            if [ -n "$SF_BIN" ] && [ -f "$SF_BIN" ]; then
              cp "$SF_BIN" app/src/main/jniLibs/arm64-v8a/libstockfish.so
              chmod +x app/src/main/jniLibs/arm64-v8a/libstockfish.so || true
              echo "Stockfish ready: $(wc -c < app/src/main/jniLibs/arm64-v8a/libstockfish.so) bytes"
              file app/src/main/jniLibs/arm64-v8a/libstockfish.so || true
            else
              echo "FATAL: could not locate Stockfish binary in download"; exit 1
            fi
          else
            # Fallback: build Stockfish from source using NDK
            echo "No prebuilt asset found — compiling Stockfish 16 from source..."
            sudo apt-get install -y --no-install-recommends build-essential

            # Reuse NDK if already downloaded for Ryzix, otherwise fetch it
            NDK_VERSION="r25c"
            NDK_PATH="/tmp/ndk/android-ndk-${NDK_VERSION}"
            if [ ! -d "$NDK_PATH" ]; then
              curl -fsSL "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
                -o /tmp/ndk.zip
              unzip -q /tmp/ndk.zip -d /tmp/ndk
            fi
            CXX="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"

            curl -fsSL "https://github.com/official-stockfish/Stockfish/archive/refs/tags/sf_16.tar.gz" \
              | tar -xz -C /tmp
            cd /tmp/Stockfish-sf_16/src
            # Build for Android ARM64
            make build ARCH=armv8 COMP=clang CXX="$CXX" \
              CXXFLAGS="-O3 -DNDEBUG -static-libstdc++" 2>&1 | tail -20
            cp stockfish /home/runner/work/RyzixChess-Android/RyzixChess-Android/app/src/main/jniLibs/arm64-v8a/libstockfish.so
            echo "Compiled Stockfish: $(wc -c < /home/runner/work/RyzixChess-Android/RyzixChess-Android/app/src/main/jniLibs/arm64-v8a/libstockfish.so) bytes"
          fi

      # ── 7. Verify engine binaries ─────────────────────────────────────────
      - name: Verify engine binaries
        run: |
          echo "=== Engine binaries ==="
          for lib in libryzix.so libstockfish.so; do
            path="app/src/main/jniLibs/arm64-v8a/$lib"
            if [ -f "$path" ]; then
              echo "✅ $lib: $(wc -c < $path) bytes"
              file "$path" || true
            else
              echo "❌ MISSING: $lib"; exit 1
            fi
          done

      # ── 8. Signing keystore ───────────────────────────────────────────────
      - name: Restore signing keystore
        run: |
          mkdir -p signing
          if [ -f signing/signing-key.jks ]; then
            echo "Using committed keystore: $(wc -c < signing/signing-key.jks) bytes"
          elif [ -n "${{ secrets.SIGNING_KEYSTORE_B64 }}" ]; then
            echo "Using SIGNING_KEYSTORE_B64 secret"
            echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > signing/signing-key.jks
            echo "Keystore restored: $(wc -c < signing/signing-key.jks) bytes"
          else
            echo "⚠️  No keystore found — generating fresh one"
            keytool -genkeypair \
              -alias RyzixChess -keypass 123456 \
              -keystore signing/signing-key.jks \
              -storepass 123456 \
              -dname "CN=RyzixChess,OU=Dev,O=RDChess,L=India,S=India,C=IN" \
              -keyalg RSA -keysize 2048 -validity 10000 -noprompt
          fi

      # ── 9. local.properties ───────────────────────────────────────────────
      - name: Create local.properties
        run: |
          printf 'signing.storeFile=signing/signing-key.jks\nsigning.storePassword=123456\nsigning.keyAlias=RyzixChess\nsigning.keyPassword=123456\n' \
            > local.properties

      # ── 10. chmod gradlew ─────────────────────────────────────────────────
      - name: chmod gradlew
        run: chmod +x ./gradlew

      # ── 11. Auto version bump ─────────────────────────────────────────────
      # versionCode  = github.run_number  (always incrementing, unique per build)
      # versionName  = 1.0.<run_number>   (e.g. 1.0.42 for build #42)
      # Changes are local to the CI workspace — nothing is committed back.
      - name: Bump version
        run: |
          BUILD=${{ github.run_number }}
          VER_NAME="1.0.${BUILD}"
          sed -i "s/versionCode = [0-9]*/versionCode = ${BUILD}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VER_NAME}\"/" app/build.gradle.kts
          echo "versionCode  → ${BUILD}"
          echo "versionName  → ${VER_NAME}"
          grep -E 'versionCode|versionName' app/build.gradle.kts

      # ── 12. Assemble Release APK ──────────────────────────────────────────
      - name: Assemble Release APK
        run: |
          set -o pipefail
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      # ── 13. Get version info ──────────────────────────────────────────────
      # versionName was already bumped to "1.0.<run>" by the Bump version step,
      # so VER reads as "1.0.42" for build 42 — no extra suffix needed.
      - name: Get version info
        id: version
        run: |
          VER=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          echo "name=$VER" >> $GITHUB_OUTPUT
          echo "apk_name=RyzixChess-v${VER}.apk" >> $GITHUB_OUTPUT
          echo "Version: $VER  →  RyzixChess-v${VER}.apk"

      # ── 14. Rename APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"

      # ── 14. Upload artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: app/build/outputs/apk/release/RyzixChess-*.apk
          retention-days: 30

      # ── 15. GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "Ryzix Chess v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            **Ryzix Chess v${{ steps.version.outputs.name }} — Automated Release**

            Branch: `${{ github.ref_name }}` | Commit: `${{ github.sha }}`
            Package: `com.ryzix.chess`
            Engines: **Ryzix Engine** + **Stockfish 16** (both ARM64 native)

            **What's new:**
            - Engine Battle mode: real Stockfish 16 binary vs Ryzix 1000 ELO
            - Two separate engine processes — independent UCI sessions
            - Humanoid delays, UCI_LimitStrength+UCI_Elo=1000 for Ryzix side
            - OTB model selector (Ryzix Engine / Stockfish 16 label in analysis)

            **Install:** Download APK → enable "Install from unknown sources" → install.
          draft: false
          prerelease: true
          files: app/build/outputs/apk/release/RyzixChess-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 16. Telegram — SUCCESS ────────────────────────────────────────────
      - name: Telegram — Success
        if: success()
        run: |
          RELEASE_URL="https://github.com/RD7890/RyzixChess-Android/releases/tag/v${{ steps.version.outputs.name }}-build.${{ github.run_number }}"
          ARTIFACT_URL="https://github.com/RD7890/RyzixChess-Android/actions/runs/${{ github.run_id }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Get APK size
          APK_SIZE=$(du -sh app/build/outputs/apk/release/*.apk 2>/dev/null | awk '{print $1}' | head -1 || echo "?")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$(printf '✅ *Ryzix Chess v%s Build #%s — SUCCESS*\n\n📦 APK: `%s` (%s)\n🌿 Branch: `%s`\n🔖 Commit: `%s`\n⚙️ Engines: Ryzix (ARM64) + Stockfish 16 (ARM64)\n\n🔗 *Download APK:*\n[GitHub Release](%s)\n[Build Artifacts](%s)' \
              '${{ steps.version.outputs.name }}' '${{ github.run_number }}' \
              '${{ steps.version.outputs.apk_name }}' "$APK_SIZE" \
              '${{ github.ref_name }}' "$SHORT_SHA" \
              "$RELEASE_URL" "$ARTIFACT_URL")"
          tail -200 build.log > build_summary.log
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@build_summary.log \
            -F caption="📋 Ryzix Chess Build #${{ github.run_number }} — last 200 lines"

      # ── 17. Telegram — FAILURE ────────────────────────────────────────────
      - name: Telegram — Failure
        if: failure()
        run: |
          ACTIONS_URL="https://github.com/RD7890/RyzixChess-Android/actions/runs/${{ github.run_id }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$(printf '❌ *Ryzix Chess Build #%s — FAILED*\n\n🌿 Branch: `%s`\n🔖 Commit: `%s`\n\n🔍 [View logs](%s)\n\nLog attached 👇' \
              '${{ github.run_number }}' '${{ github.ref_name }}' "$SHORT_SHA" "$ACTIONS_URL")"
          if [ -f build.log ]; then tail -200 build.log > fail_log.txt
          else echo "Build failed before Gradle step" > fail_log.txt; fi
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@fail_log.txt \
            -F caption="💥 Ryzix Chess failure log — Build #${{ github.run_number }}"
